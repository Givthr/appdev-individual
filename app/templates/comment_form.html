<!DOCTYPE html>
<html>
<head>
    <title>Add Comment</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<div class="container">
    <h2 class="center">Add Comment</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        {% if form.errors %}
            <div class="error">
                {{ form.errors }}
            </div>
        {% endif %}

        <button type="submit">Submit</button>
    </form>
</div>
</body>
</html>
